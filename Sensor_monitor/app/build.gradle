plugins {
    id 'com.android.application'
    id 'org.jetbrains.kotlin.android'
    id 'kotlin-parcelize'
    id "org.jetbrains.kotlin.kapt"
}

android {
    namespace 'com.gachon_HCI_Lab.user_mobile'
    compileSdk 33

    defaultConfig {
        // [2026-06-29] 이유: 기존 Sensor Monitor와 동시 설치(연동 테스트). | 목적: 별도 패키지로 나란히 설치. namespace는 그대로 유지(코드 패키지 불변).
        applicationId "com.gachon_HCI_Lab.user_mobile.dct"
        minSdk 24
        targetSdk 33
        versionCode 2
        versionName "1.1"

        testInstrumentationRunner "androidx.test.runner.AndroidJUnitRunner"
    }

    // [수정] kapt 설정을 별도 블록으로 분리하여 경고 해결 및 가독성 향상
    kapt {
        // 1. 인식되지 않는 옵션에 대한 경고를 무시하도록 javac 인자 추가
        javacOptions {
            option("-Xlint:-processing")
        }
        // 2. Room 스키마 경로 설정
        arguments {
            arg("room.schemaLocation", "$projectDir/schemas")
        }
    }

    buildTypes {
        release {
            minifyEnabled false
            proguardFiles getDefaultProguardFile('proguard-android-optimize.txt'), 'proguard-rules.pro'
        }
    }

    compileOptions {
        sourceCompatibility JavaVersion.VERSION_17
        targetCompatibility JavaVersion.VERSION_17
    }

    kotlinOptions {
        jvmTarget = '17'
    }

    buildFeatures {
        viewBinding true
        dataBinding true
    }
}

dependencies {
    // 안드로이드 기본 라이브러리
    implementation 'androidx.core:core-ktx:1.7.0'
    implementation 'androidx.appcompat:appcompat:1.6.1'
    implementation 'com.google.android.material:material:1.8.0'
    implementation 'androidx.constraintlayout:constraintlayout:2.1.4'

    // 유틸리티 및 통신
    implementation 'io.github.ParkSangGwon:tedpermission-normal:3.3.0'
    implementation 'com.squareup.okhttp3:okhttp:3.10.0'
    // [2026-07-09] 이유: QR 로그인 Phase 1 — pbcr(qr_code_scanner_plus)과 동일 QR JSON 규격을 네이티브로 스캔. | 목적: studyId/subjectId를 QR로 주입 (qr_login_integration_plan_2026-05-26.md §6 권장 라이브러리)
    implementation 'com.journeyapps:zxing-android-embedded:4.3.0'
    implementation 'com.github.PhilJay:MPAndroidChart:v3.1.0'
    implementation 'com.opencsv:opencsv:5.7.1'
    implementation 'org.greenrobot:eventbus:3.3.1'
    implementation 'org.jetbrains.kotlinx:kotlinx-coroutines-android:1.6.1'
    implementation 'androidx.work:work-runtime-ktx:2.7.0'

    // Room DB (버전 일관성 유지)
    implementation "androidx.room:room-runtime:2.5.0"
    implementation "androidx.room:room-ktx:2.5.0"
    kapt "androidx.room:room-compiler:2.5.0"

    // 테스트
    testImplementation 'junit:junit:4.13.2'
    testImplementation 'org.mockito.kotlin:mockito-kotlin:4.1.0'
    androidTestImplementation 'androidx.test.ext:junit:1.1.5'
    androidTestImplementation 'androidx.test.espresso:espresso-core:3.5.1'
}